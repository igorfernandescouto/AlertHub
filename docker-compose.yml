services:
  postgres:
    image: postgres:16-alpine
    container_name: alerthub-postgres
    environment:
      POSTGRES_DB: alerthub
      POSTGRES_USER: alerthub
      POSTGRES_PASSWORD: alerthub
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alerthub -d alerthub"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:latest
    container_name: alerthub-kafka
    ports:
      - "9092:9092"

volumes:
  postgres-data:
