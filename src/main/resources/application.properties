quarkus.application.name=alert-hub
quarkus.application.version=0.1.0
quarkus.banner.enabled=false

quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/docs
quarkus.smallrye-openapi.path=/openapi
mp.openapi.extensions.smallrye.info.title=AlertHub API
mp.openapi.extensions.smallrye.info.version=${quarkus.application.version}
mp.openapi.extensions.smallrye.info.description=Multi-tenant backend for alert orchestration.

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:alerthub}
quarkus.datasource.password=${DB_PASSWORD:alerthub}
quarkus.datasource.jdbc.url=${DB_JDBC_URL:jdbc:postgresql://localhost:5432/alerthub}
quarkus.datasource.devservices.enabled=false

quarkus.hibernate-orm.schema-management.strategy=none
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.jdbc.timezone=UTC

quarkus.flyway.migrate-at-start=true
quarkus.flyway.validate-migration-naming=true

quarkus.kafka.devservices.enabled=false
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
mp.messaging.outgoing.events-out.connector=smallrye-kafka
mp.messaging.outgoing.events-out.topic=alerthub-events
mp.messaging.outgoing.events-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.incoming.events-in.connector=smallrye-kafka
mp.messaging.incoming.events-in.topic=alerthub-events
mp.messaging.incoming.events-in.group.id=alerthub-event-processor
mp.messaging.incoming.events-in.auto.offset.reset=earliest
mp.messaging.incoming.events-in.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer

mp.jwt.verify.publickey.location=keys/public-key.pem
mp.jwt.verify.issuer=alerthub
smallrye.jwt.sign.key.location=keys/private-key.pem
alerthub.security.token-duration-hours=8
alerthub.processing.max-retries=3

quarkus.log.level=INFO
